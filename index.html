<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hypertension Survey | IBS Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --blood-red: #c41e3a;
            --dark-red: #8b0000;
            --pure-white: #ffffff;
            --glass: rgba(15, 15, 30, 0.88);
            --accent: #ff5555;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0000 100%);
            color: var(--pure-white);
            overflow: hidden;
        }

        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: brightness(0.35) contrast(1.3) saturate(1.1);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0, 0, 0, 0.5) 50%, rgba(10, 0, 0, 0.95) 100%);
            z-index: -1;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.15); }
            28% { transform: scale(1); }
            42% { transform: scale(1.08); }
            70% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        @keyframes heartbeat-glow {
            0% { text-shadow: 0 0 30px rgba(196, 30, 58, 0.8), 0 0 60px rgba(196, 30, 58, 0.4); }
            14% { text-shadow: 0 0 80px rgba(196, 30, 58, 1), 0 0 120px rgba(196, 30, 58, 0.9); }
            28% { text-shadow: 0 0 30px rgba(196, 30, 58, 0.8), 0 0 60px rgba(196, 30, 58, 0.4); }
            42% { text-shadow: 0 0 50px rgba(196, 30, 58, 0.9), 0 0 90px rgba(196, 30, 58, 0.6); }
            70% { text-shadow: 0 0 30px rgba(196, 30, 58, 0.8), 0 0 60px rgba(196, 30, 58, 0.4); }
            100% { text-shadow: 0 0 30px rgba(196, 30, 58, 0.8), 0 0 60px rgba(196, 30, 58, 0.4); }
        }

        .pulse {
            animation: heartbeat 1.1s ease-in-out infinite;
        }

        .heartbeat-monitor {
            position: fixed;
            bottom: 35px;
            left: 35px;
            z-index: 20;
            width: 220px;
            height: 90px;
            background: rgba(0, 0, 0, 0.75);
            border: 2.5px solid var(--blood-red);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(196, 30, 58, 0.6), inset 0 0 15px rgba(0, 0, 0, 0.9);
        }

        .heartbeat-monitor svg {
            width: 100%;
            height: 100%;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-40px); }
        }

        .page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            animation: fadeOut 0.5s ease-out forwards;
            z-index: 10;
        }

        .page.active {
            opacity: 1;
            pointer-events: auto;
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .landing-page {
            flex-direction: column;
            justify-content: center;
            padding: 40px 20px;
        }

        .landing-content {
            text-align: center;
            z-index: 11;
        }

        .landing-content h1 {
            font-size: 5rem;
            font-weight: 900;
            margin: 0 0 20px 0;
            letter-spacing: -3px;
            color: var(--pure-white);
            animation: heartbeat-glow 1.1s ease-in-out infinite;
        }

        .landing-content p.subtitle {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--pure-white);
            margin: 15px 0 5px 0;
            letter-spacing: 2px;
        }

        .landing-content p.presenter {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.75);
            margin: 0 0 80px 0;
            font-weight: 600;
        }

        .start-button {
            background: linear-gradient(135deg, var(--blood-red) 0%, var(--accent) 100%);
            color: var(--pure-white);
            padding: 20px 80px;
            font-size: 1.1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 15px 40px rgba(196, 30, 58, 0.5);
            position: relative;
            overflow: hidden;
        }

        .start-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 25px 60px rgba(196, 30, 58, 0.7);
            background: linear-gradient(135deg, var(--accent) 0%, #ff7777 100%);
        }

        .question-page {
            padding: 40px 20px;
        }

        .question-container {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 2px solid rgba(196, 30, 58, 0.35);
            border-radius: 30px;
            padding: 60px 50px;
            max-width: 750px;
            width: 100%;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.95), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            z-index: 11;
        }

        .question-counter {
            text-align: center;
            font-size: 0.95rem;
            color: var(--blood-red);
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--blood-red), var(--accent));
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .question-page h2 {
            font-size: 2.1rem;
            margin: 0 0 50px 0;
            line-height: 1.3;
            color: var(--pure-white);
            font-weight: 700;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.5);
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 50px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(196, 30, 58, 0.4);
            padding: 25px 20px;
            border-radius: 18px;
            color: var(--pure-white);
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover {
            border-color: var(--blood-red);
            background: rgba(196, 30, 58, 0.15);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(196, 30, 58, 0.4);
        }

        .option-btn.selected {
            background: var(--blood-red);
            border-color: var(--accent);
            color: var(--pure-white);
            box-shadow: 0 0 30px var(--blood-red), 0 0 60px rgba(196, 30, 58, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.15);
            transform: scale(1.08);
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }

        .next-btn, .back-btn {
            padding: 16px 50px;
            border-radius: 50px;
            border: none;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-size: 0.95rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .next-btn {
            background: linear-gradient(135deg, var(--blood-red) 0%, var(--accent) 100%);
            color: var(--pure-white);
        }

        .next-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .next-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 18px 45px rgba(196, 30, 58, 0.6);
            background: linear-gradient(135deg, var(--accent) 0%, #ff7777 100%);
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.15);
            color: var(--pure-white);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: var(--pure-white);
            transform: translateY(-3px);
        }

        .results-page {
            padding: 40px 20px;
        }

        .results-container {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 2px solid rgba(196, 30, 58, 0.35);
            border-radius: 30px;
            padding: 50px;
            max-width: 850px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.95), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            z-index: 11;
        }

        .results-container::-webkit-scrollbar {
            width: 8px;
        }

        .results-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .results-container::-webkit-scrollbar-thumb {
            background: var(--blood-red);
            border-radius: 10px;
        }

        .results-page h2 {
            color: var(--blood-red);
            margin-bottom: 40px;
            text-align: center;
            font-size: 2.2rem;
            text-shadow: 0 0 25px rgba(196, 30, 58, 0.5);
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 40px;
        }

        .results-table thead {
            background: rgba(196, 30, 58, 0.2);
            border-bottom: 2px solid var(--blood-red);
        }

        .results-table th {
            padding: 18px 16px;
            text-align: left;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--blood-red);
            font-size: 0.85rem;
        }

        .results-table td {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .results-table tbody tr:hover {
            background: rgba(196, 30, 58, 0.12);
        }

        .results-table td:nth-child(2) {
            font-weight: 900;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: right;
        }

        .results-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 50px;
        }

        .restart-btn, .back-results-btn {
            padding: 16px 50px;
            border-radius: 50px;
            border: none;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-size: 0.95rem;
        }

        .restart-btn {
            background: linear-gradient(135deg, var(--blood-red) 0%, var(--accent) 100%);
            color: var(--pure-white);
            box-shadow: 0 10px 30px rgba(196, 30, 58, 0.5);
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 45px rgba(196, 30, 58, 0.7);
            background: linear-gradient(135deg, var(--accent) 0%, #ff7777 100%);
        }

        .back-results-btn {
            background: rgba(255, 255, 255, 0.15);
            color: var(--pure-white);
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: none;
        }

        .back-results-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-3px);
        }

        @media (max-width: 768px) {
            .landing-content h1 { font-size: 3.5rem; }
            .landing-content p.subtitle { font-size: 1.3rem; }
            .question-container, .results-container { padding: 40px 25px; margin: 0 15px; }
            .question-page h2 { font-size: 1.6rem; margin-bottom: 35px; }
            .options-grid { grid-template-columns: 1fr; gap: 15px; }
            .option-btn { padding: 18px 15px; font-size: 0.9rem; }
            .button-group { flex-direction: column; gap: 15px; }
            .next-btn, .back-btn, .restart-btn, .back-results-btn { padding: 14px 40px; font-size: 0.85rem; width: 100%; }
            .results-table { font-size: 0.85rem; }
            .results-table th, .results-table td { padding: 12px 8px; }
            .heartbeat-monitor { width: 180px; height: 75px; bottom: 20px; left: 20px; }
        }

        @media (max-width: 480px) {
            .landing-content h1 { font-size: 2.8rem; }
            .landing-content p.subtitle { font-size: 1rem; }
            .start-button { padding: 16px 50px; font-size: 0.9rem; }
            .heartbeat-monitor { display: none; }
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video" preload="auto">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-beating-human-heart-close-up-31580-large.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="heartbeat-monitor">
        <svg class="heartbeat-svg" viewBox="0 0 500 100" xmlns="http://www.w3.org/2000/svg">
            <polyline points="0,50 25,50 35,30 45,70 55,50 75,50 85,35 95,65 110,50 150,50 160,40 170,60 180,50 220,50 230,45 240,55 250,50 280,50 290,20 310,80 330,50 380,50 390,45 400,55 410,50 500,50" fill="none" stroke="#c41e3a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>
            <circle cx="20" cy="50" r="2.5" fill="#c41e3a" />
            <circle cx="490" cy="50" r="2.5" fill="#c41e3a" />
        </svg>
    </div>

    <div id="landing-page" class="page landing-page active">
        <div class="landing-content">
            <h1>IBS PROJECT</h1>
            <p class="subtitle">Semester Two</p>
            <p class="presenter">Presented to: Dr. Yasmin</p>
            <button class="start-button" onclick="startSurvey()">Start Survey</button>
        </div>
    </div>

    <div id="question-page" class="page question-page">
        <div class="question-container">
            <div class="question-counter" id="counter"></div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <h2 id="question-text"></h2>
            <div class="options-grid" id="options-grid"></div>
            <div class="button-group">
                <button class="back-btn" onclick="previousQuestion()">← Back</button>
                <button class="next-btn" id="next-btn" disabled onclick="nextQuestion()">Next →</button>
            </div>
        </div>
    </div>

    <div id="results-page" class="page results-page">
        <div class="results-container">
            <h2>Survey Summary</h2>
            <table class="results-table">
                <thead>
                    <tr>
                        <th>Question</th>
                        <th>Your Answer</th>
                    </tr>
                </thead>
                <tbody id="results-body"></tbody>
            </table>
            <div class="results-buttons">
                <button class="back-results-btn" onclick="goBackToQuestions()">← Back</button>
                <button class="restart-btn" onclick="restartSurvey()">Restart Survey</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            "Do you eat a lot of salty foods?",
            "Do you eat fruits and vegetables daily?",
            "Is your weight healthy?",
            "Do you exercise regularly?",
            "Do you consume a lot of caffeine?",
            "Do you smoke?",
            "Do you sleep well (7–8 hours)?",
            "Do you often feel stressed?",
            "Do you check your blood pressure?",
            "Family history of High Blood Pressure?"
        ];

        let currentQuestion = 0;
        let answers = new Array(questions.length).fill(null);

        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageName).classList.add('active');
        }

        function startSurvey() {
            currentQuestion = 0;
            answers = new Array(questions.length).fill(null);
            displayQuestion();
            showPage('question-page');
        }

        function displayQuestion() {
            const question = questions[currentQuestion];
            document.getElementById('question-text').textContent = question;
            document.getElementById('counter').textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
            
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';

            const optionsGrid = document.getElementById('options-grid');
            optionsGrid.innerHTML = '';
            
            ['Yes', 'No', 'Maybe'].forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                if (answers[currentQuestion] === option) {
                    btn.classList.add('selected');
                }
                btn.onclick = () => selectAnswer(option, btn);
                optionsGrid.appendChild(btn);
            });

            document.getElementById('next-btn').disabled = answers[currentQuestion] === null;
            document.querySelector('.back-btn').style.visibility = currentQuestion === 0 ? 'hidden' : 'visible';

            document.querySelector('.question-container').scrollTop = 0;
        }

        function selectAnswer(answer, btn) {
            answers[currentQuestion] = answer;
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            document.getElementById('next-btn').disabled = false;
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                displayQuestion();
            } else {
                showResults();
            }
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                displayQuestion();
            }
        }

        function showResults() {
            const tbody = document.getElementById('results-body');
            tbody.innerHTML = '';
            
            questions.forEach((q, i) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${q}</td>
                    <td>${answers[i]}</td>
                `;
                tbody.appendChild(row);
            });

            showPage('results-page');
        }

        function goBackToQuestions() {
            currentQuestion = questions.length - 1;
            displayQuestion();
            showPage('question-page');
        }

        function restartSurvey() {
            showPage('landing-page');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const activeBtn = document.querySelector('.next-btn:not(:disabled)') || document.querySelector('.start-button');
                if (activeBtn && !activeBtn.disabled) {
                    activeBtn.click();
                }
            }
            if (e.key === 'ArrowRight') {
                const nextBtn = document.querySelector('.next-btn:not(:disabled)');
                if (nextBtn) nextBtn.click();
            }
            if (e.key === 'ArrowLeft') {
                const backBtn = document.querySelector('.back-btn');
                if (backBtn && backBtn.style.visibility !== 'hidden') backBtn.click();
            }
        });
    </script>
</body>
</html>
